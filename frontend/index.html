<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema de Pedidos</title>

    <link rel="stylesheet" href="styles.css">

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script defer src="procesar_imagen.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>


<div x-data="escanerCamara()" class="app-container" x-cloak>
    <div x-show="pantallaActual === PantallaEnum.CONFIGURACION">
        <h2>Configuración del Pedido</h2>

        <label>Razón Social:</label><br>
        <input type="text" x-model="razonSocial" placeholder="Ej: Cliente S.A."><br><br>

        <label>Fecha:</label><br>
        <input type="date" x-model="fecha"><br><br>

        <label>Empleado:</label><br>
        <select x-model="empleadoAsignado">
            <option value="">Seleccione...</option>
            <option value="Prueba1">Prueba 1</option>
            <option value="Prueba2">Prueba 2</option>
            <option value="Prueba3">Prueba 3</option>
        </select><br><br>

        <button @click="iniciarEscaneo()" style="padding: 10px 20px;">Confirmar y Escanear ➡️</button>
    </div>

    <div x-show="pantallaActual === PantallaEnum.ESCANER" style="display: none;" x-cloak>
        <h2>Escaneando para: <span x-text="razonSocial"></span></h2>

        <div id="lector-camara" style="width: 100%; max-width: 400px; background: #000;"></div>

        <div x-show="codigoLeido !== ''" style="margin-top: 15px; background: #f0f0f0; padding: 10px;">
            <p>Código detectado: <strong x-text="codigoLeido"></strong></p>
            <label>Cantidad:</label>
            <input type="number" x-model="cantidad" inputmode="numeric" pattern="[0-9]*">
            <button @click="guardarItem()">Agregar a Lista</button>
        </div>

        <hr>

        <h3>Items Registrados (<span x-text="listaCodigos.length"></span>)</h3>
        <ul>
            <template x-for="(item, index) in listaCodigos" :key="index">
                <li>
                    <span x-text="item.codigo"></span> - Cantidad: <span x-text="item.cantidad"></span>
                    <button @click="eliminarCodigo(index)">❌</button>
                </li>
            </template>
        </ul>

        <button @click="volver()" style="margin-top: 20px;">⬅️ Volver</button>
        <button @click="enviarDatos()" style="background: green; color: white;">Finalizar y Enviar 📤</button>
    </div>

</div>

</body>
</html>
